<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rey de Reyes</title>
    <!-- Tailwind CSS para el diseño elegante -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para los íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter para un look moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9; /* slate-100 */
        }
        
        /* Estilizar el scrollbar para mantener la elegancia */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Ocultar flechas en input type number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-800">

    <!-- Navegación Superior -->
    <header class="bg-slate-900 text-white shadow-md z-10">
        <div class="px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-store text-emerald-400 text-2xl"></i>
                <span class="text-xl font-bold tracking-wide">Rey de reyes <span class="text-emerald-400">X</span><span> NJS</span></span>
            </div>
                                                <nav class="flex gap-1 bg-slate-800 p-1 rounded-lg">
                <a href="/venta" class="px-5 py-2 rounded-md bg-emerald-500 text-white font-medium shadow-sm transition-all">
                    <i class="fa-solid fa-cart-shopping mr-2"></i>Venta
                </a>
                <a href="/compra" class="px-5 py-2 rounded-md text-slate-300 hover:text-white hover:bg-slate-700 font-medium transition-all">
                    <i class="fa-solid fa-box-open mr-2"></i>Compra
                </a>
                <a href="/tesoreria" class="px-5 py-2 rounded-md text-slate-300 hover:text-white hover:bg-slate-700 font-medium transition-all">
                    <i class="fa-solid fa-vault mr-2"></i>Tesorer&iacute;a
                </a>
                <a href="/inventario" class="px-5 py-2 rounded-md text-slate-300 hover:text-white hover:bg-slate-700 font-medium transition-all">
                    <i class="fa-solid fa-boxes-stacked mr-2"></i>Inventario
                </a>
                <a href="/clientes" class="px-5 py-2 rounded-md text-slate-300 hover:text-white hover:bg-slate-700 font-medium transition-all">
                    <i class="fa-solid fa-users mr-2"></i>Clientes
                </a>
                <a href="/estadisticas" class="px-5 py-2 rounded-md text-slate-300 hover:text-white hover:bg-slate-700 font-medium transition-all">
                    <i class="fa-solid fa-chart-pie mr-2"></i>Estad&iacute;sticas
                </a>
            </nav>
        </div>
    </header>

    <!-- Área de Trabajo Principal -->
    <main class="flex-1 flex overflow-hidden p-6 gap-6">
        
        <!-- Panel Izquierdo: Inputs y Grilla (70%) -->
        <div class="flex flex-col flex-1 gap-6 overflow-hidden w-2/3">
            
            <!-- Controles de Ingreso de Producto -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <form id="product-form" class="flex gap-4 items-end">
                    
                    <!-- Código Producto -->
                    <div class="flex-1">
                        <label for="codigo" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Código Producto</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-barcode text-slate-400"></i>
                            </div>
                            <input type="text" id="codigo" autofocus placeholder="Escanea o escribe..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                        </div>
                    </div>

                    <!-- Cantidad -->
                    <div class="w-24">
                        <label for="cantidad" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Cantidad</label>
                        <input type="number" id="cantidad" value="1" min="1" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none text-center transition-all">
                    </div>

                    <!-- Buscador (Botón/Input combinado) -->
                    <div class="flex-1">
                        <label for="buscar" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Buscador Manual</label>
                        <div class="flex">
                            <input type="text" id="buscar" placeholder="Buscar por nombre..." class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-l-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all border-r-0">
                            <button type="button" class="bg-slate-100 border border-slate-300 border-l-0 px-4 py-2.5 rounded-r-lg text-slate-600 hover:bg-slate-200 transition-colors">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Categorías -->
                    <div class="flex-1">
                        <label for="categoria" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Categorías</label>
                        <select id="categoria" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all appearance-none cursor-pointer">
                            <option value="">Todas las categorías</option>
                            <option value="bebidas">Bebidas</option>
                            <option value="snacks">Snacks y Golosinas</option>
                            <option value="limpieza">Limpieza</option>
                            <option value="almacen">Almacén</option>
                            <option value="cigarros">Cigarrillos</option>
                        </select>
                    </div>

                    <!-- Botón Agregar (Opcional, usualmente se usa Enter en el código) -->
                    <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm h-[46px] flex items-center">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </form>
            </div>

            <!-- Grilla de Productos -->
            <div class="bg-white flex-1 rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                <div class="overflow-y-auto flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200">Cód.</th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200">Descripción</th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200 text-center">Cant.</th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200 text-right">Precio Un.</th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200 text-right">Subtotal</th>
                                <th class="py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200 text-center"><i class="fa-solid fa-gear"></i></th>
                            </tr>
                        </thead>
                        <tbody id="cart-body" class="divide-y divide-slate-100">
                            <!-- Los productos se insertarán aquí con JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Panel Derecho: Totales y Cobro (30%) -->
        <div class="w-1/3 min-w-[320px] max-w-[400px] flex flex-col gap-6">
            
            <!-- Display de Precio Actual / Último artículo -->
            <div class="bg-slate-900 rounded-xl shadow-lg border border-slate-800 p-6 text-center relative overflow-hidden">
                <!-- Efecto de brillo -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-500 rounded-full blur-3xl opacity-20"></div>
                
                <h2 class="text-slate-400 text-sm font-medium uppercase tracking-widest mb-1">Total a pagar</h2>
                <div id="last-item-name" class="text-slate-200 text-lg font-semibold truncate mb-2 h-7">---</div>
                <div class="text-emerald-400 font-bold text-5xl tracking-tight" id="last-item-price">
                    $0.00
                </div>
            </div>

            <!-- Resumen de Cuenta -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col flex-1">
                <h3 class="text-lg font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3"><i class="fa-solid fa-receipt mr-2 text-slate-400"></i>Resumen de Venta</h3>
                
                <div class="space-y-4 mb-6 flex-1">
                    <div class="flex justify-between items-center text-slate-600">
                        <span class="font-medium">Sub Total</span>
                        <span class="font-semibold text-lg" id="summary-subtotal">$0.00</span>
                    </div>
                    
                    <div class="flex justify-between items-center text-rose-500">
                        <span class="font-medium cursor-pointer border-b border-dashed border-rose-300 hover:text-rose-600 transition-colors" title="Haz clic para aplicar descuento general">Descuento Total</span>
                        <div class="flex items-center">
                            <span class="mr-1">-</span>
                            <span class="font-semibold text-lg" id="summary-discount">$0.00</span>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center text-slate-500 text-sm">
                        <span>Artículos en carrito</span>
                        <span class="font-semibold bg-slate-100 px-2 py-0.5 rounded" id="summary-items">0</span>
                    </div>
                </div>

                <!-- Total Principal -->
                <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                    <div class="flex justify-between items-end">
                        <span class="text-slate-500 font-bold uppercase tracking-wider text-sm">Total a Pagar</span>
                        <span class="text-slate-900 font-bold text-4xl" id="summary-total">$0.00</span>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="grid grid-cols-2 gap-3 mt-auto">
                    <button onclick="clearCart()" class="py-3 px-4 bg-white border-2 border-slate-200 text-slate-600 font-bold rounded-lg hover:bg-slate-50 hover:border-slate-300 hover:text-rose-500 transition-all">
                        <i class="fa-solid fa-trash-can mr-2"></i>Cancelar
                    </button>
                    <button class="py-3 px-4 bg-emerald-500 text-white font-bold rounded-lg hover:bg-emerald-600 shadow-md shadow-emerald-500/30 transition-all flex justify-center items-center">
                        <i class="fa-solid fa-money-bill-wave mr-2"></i>Cobrar (F12)
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Script de Lógica del POS -->
    <script>
        // --- BASE DE DATOS SIMULADA ---
        const mockProducts = {
            '77912345': { id: 1, name: 'Coca Cola 2.25L', price: 2500.00 },
            '77954321': { id: 2, name: 'Papas Lays Clásicas 145g', price: 1800.00 },
            '77900011': { id: 3, name: 'Alfajor Jorgito Chocolate', price: 600.00 },
            '77999999': { id: 4, name: 'Cigarrillos Marlboro Box 20', price: 2200.00 },
            '123':      { id: 5, name: 'Caramelos Surtidos (100g)', price: 400.00 }
        };

        // --- ESTADO DEL CARRITO ---
        let cart = [];
        let globalDiscount = 0; // Podrías agregar lógica para modificar esto luego

        // --- ELEMENTOS DEL DOM ---
        const form = document.getElementById('product-form');
        const inputCodigo = document.getElementById('codigo');
        const inputCantidad = document.getElementById('cantidad');
        const cartBody = document.getElementById('cart-body');
        
        // Displays
        const lastItemName = document.getElementById('last-item-name');
        const lastItemPrice = document.getElementById('last-item-price');
        const elSubtotal = document.getElementById('summary-subtotal');
        const elDiscount = document.getElementById('summary-discount');
        const elTotal = document.getElementById('summary-total');
        const elItems = document.getElementById('summary-items');

        // Formateador de Moneda (Pesos / Dólares según config)
        const formatMoney = (amount) => {
            return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(amount);
        };

        // --- FUNCIONES PRINCIPALES ---

        // Manejar el submit del formulario (cuando se escanea o se da Enter)
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const code = inputCodigo.value.trim();
            const qty = parseInt(inputCantidad.value) || 1;

            if (!code) return;

            const product = mockProducts[code];

            if (product) {
                addProductToCart(code, product, qty);
                
                // Actualizar display de último artículo
                lastItemName.textContent = product.name;
                lastItemPrice.textContent = formatMoney(product.price);
                
                // Limpiar inputs
                inputCodigo.value = '';
                inputCantidad.value = '1';
                inputCodigo.focus();
            } else {
                alert('Producto no encontrado. Intente con "123" o "77912345"');
                inputCodigo.select();
            }
        });

        function addProductToCart(code, product, qty) {
            // Verificar si ya existe en el carrito para sumar cantidad
            const existingItemIndex = cart.findIndex(item => item.code === code);
            
            if (existingItemIndex !== -1) {
                cart[existingItemIndex].qty += qty;
                cart[existingItemIndex].subtotal = cart[existingItemIndex].qty * cart[existingItemIndex].price;
            } else {
                cart.unshift({ // unshift para agregar arriba (opcional, push para abajo)
                    code: code,
                    name: product.name,
                    price: product.price,
                    qty: qty,
                    subtotal: product.price * qty
                });
            }
            updateUI();
        }

        function removeProduct(index) {
            cart.splice(index, 1);
            if(cart.length === 0) {
                lastItemName.textContent = '---';
                lastItemPrice.textContent = '$0.00';
            }
            updateUI();
            inputCodigo.focus();
        }

        function clearCart() {
            if(cart.length > 0 && confirm('¿Estás seguro de cancelar la venta actual?')) {
                cart = [];
                lastItemName.textContent = '---';
                lastItemPrice.textContent = '$0.00';
                updateUI();
                inputCodigo.focus();
            }
        }

        function updateUI() {
            // Renderizar Tabla
            cartBody.innerHTML = '';
            let subtotalAcc = 0;
            let totalItems = 0;

            cart.forEach((item, index) => {
                subtotalAcc += item.subtotal;
                totalItems += item.qty;

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors group';
                tr.innerHTML = `
                    <td class="py-3 px-4 text-sm font-medium text-slate-900 border-b border-slate-100">${item.code}</td>
                    <td class="py-3 px-4 text-sm text-slate-700 border-b border-slate-100">${item.name}</td>
                    <td class="py-3 px-4 text-sm font-semibold text-slate-900 border-b border-slate-100 text-center">${item.qty}</td>
                    <td class="py-3 px-4 text-sm text-slate-600 border-b border-slate-100 text-right">${formatMoney(item.price)}</td>
                    <td class="py-3 px-4 text-sm font-bold text-slate-900 border-b border-slate-100 text-right">${formatMoney(item.subtotal)}</td>
                    <td class="py-3 px-4 text-center border-b border-slate-100">
                        <button onclick="removeProduct(${index})" class="text-slate-300 hover:text-rose-500 transition-colors opacity-0 group-hover:opacity-100">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </td>
                `;
                cartBody.appendChild(tr);
            });

            // Actualizar Totales
            const total = subtotalAcc - globalDiscount;
            
            elSubtotal.textContent = formatMoney(subtotalAcc);
            elDiscount.textContent = formatMoney(globalDiscount);
            elTotal.textContent = formatMoney(total);
            elItems.textContent = totalItems;
        }

        // --- ATAJOS DE TECLADO ---
        document.addEventListener('keydown', (e) => {
            // F12 para cobrar
            if (e.key === 'F12') {
                e.preventDefault();
                if(cart.length > 0) {
                    alert('Abriendo modal de cobro por ' + elTotal.textContent);
                    // Aquí iría la lógica para abrir el modal de pago
                }
            }
            // Enfocar código de barras si se presiona una letra/número y no estamos en un input
            if (e.key.length === 1 && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') {
                inputCodigo.focus();
            }
        });

        // Inicializar foco
        window.onload = () => inputCodigo.focus();

    </script>
</body>
</html>
